<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coir · Cocos 資源依賴拓撲</title>
<style>
  :root { --bg:#11151c; --panel:#171c26; --panel2:#1d2430; --line:#2a3340; --fg:#cfd8dc; --mut:#7c8b9a; --acc:#4fc3f7; }
  * { box-sizing: border-box; }
  html, body { overscroll-behavior:none; } /* stop the macOS two-finger swipe-back */
  body { margin:0; font:13px/1.4 -apple-system,"Segoe UI",Roboto,"PingFang TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--fg); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  #topo, .treebody, #tab-list, #tab-reports { overscroll-behavior:none; }
  /* banner */
  #banner { display:flex; align-items:center; gap:12px; padding:6px 12px; background:var(--panel); border-bottom:1px solid var(--line); }
  #pickBtn { background:var(--acc); color:#04222f; border:0; padding:7px 14px; border-radius:6px; font-weight:600; cursor:pointer; }
  #pickBtn:disabled { opacity:.5; cursor:not-allowed; }
  #projectName { font-weight:600; color:#fff; }
  #stats { color:var(--mut); font-size:12px; }
  #status { color:var(--acc); font-variant-numeric:tabular-nums; font-size:12px; }
  .btabs { display:flex; gap:4px; margin-left:8px; }
  .btabs button { background:var(--panel2); border:1px solid var(--line); color:var(--mut); padding:6px 14px; border-radius:6px; cursor:pointer; }
  .btabs button.active { background:var(--acc); color:#04222f; border-color:var(--acc); font-weight:600; }
  #status { margin-left:auto; }
  /* global type filter — shared by 清單 / 拓撲 / 報告 */
  #filterbar { flex:0 0 auto; display:flex; align-items:center; gap:8px; padding:6px 12px; background:var(--panel); border-bottom:1px solid var(--line); }
  #filterbar[hidden] { display:none; }
  #filterbar .flabel { color:var(--mut); font-size:11px; flex:0 0 auto; }
  #typeFilters { display:flex; flex-wrap:wrap; gap:4px 6px; flex:1; }
  /* content area */
  #content { flex:1; position:relative; min-height:0; }
  .tab { position:absolute; inset:0; display:flex; flex-direction:column; min-height:0; }
  .tab[hidden] { display:none; }
  #tab-list { padding:0 10px 10px; overflow:auto; } /* NO top padding: a sticky thead top:0 inside a padded scroller leaves a band where rows bleed above the header */
  #tab-reports { padding:10px; overflow:auto; }
  /* list tab */
  #search { width:100%; padding:7px 9px; background:var(--panel2); border:1px solid var(--line); border-radius:6px; color:var(--fg); margin:10px 0 8px; }
  .chip { display:inline-flex; align-items:center; gap:4px; font-size:13px; color:var(--mut); cursor:pointer; background:var(--panel2); padding:3px 8px; border-radius:10px; border:1px solid transparent; opacity:.55; }
  .chip b { color:var(--fg); }
  .chip.on { opacity:1; border-color:var(--acc); color:var(--fg); }
  .chip.clr { opacity:1; color:#ef9a9a; border-color:#ef535033; }
  label.tog { display:flex; align-items:center; gap:6px; color:var(--mut); margin-bottom:8px; font-size:12px; }
  .dot { width:9px; height:9px; border-radius:50%; display:inline-block; flex:0 0 auto; }
  #nodeCount { color:var(--mut); font-size:11px; margin-bottom:4px; }
  table.ptable { width:100%; border-collapse:collapse; font-size:13px; }
  table.ptable thead th { position:sticky; top:0; z-index:1; background:var(--panel); color:var(--mut); font-weight:500; text-align:left; padding:5px 6px; border-bottom:1px solid var(--line); cursor:pointer; user-select:none; white-space:nowrap; }
  table.ptable thead th:hover { color:var(--fg); }
  table.ptable th .ar { color:var(--acc); }
  table.ptable td { padding:4px 6px; border-bottom:1px solid #20262f; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  table.ptable tbody tr { cursor:pointer; }
  table.ptable tbody tr:hover td { background:var(--panel2); }
  table.ptable tbody tr.rooted td { background:#243042; box-shadow:inset 2px 0 0 var(--acc); }
  table.ptable .cnm { width:28%; } table.ptable .cdir { width:24%; color:var(--mut); }
  table.ptable .ctype { width:11%; } table.ptable .cnum { width:auto; text-align:right; font-variant-numeric:tabular-nums; }
  table.ptable .cclo { color:var(--mut); } /* transitive-closure counts, dimmer than direct in/out */
  table.ptable .cnm .dot { margin-right:5px; }
  /* reports */
  .ref { display:flex; align-items:center; gap:6px; padding:3px 5px; border-radius:4px; cursor:pointer; }
  .ref:hover { background:var(--panel2); }
  .ref .nm { flex:0 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ref .rdir { flex:0 1 auto; min-width:0; color:var(--mut); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ref .meta { margin-left:auto; flex:0 0 auto; color:var(--mut); font-size:12px; font-variant-numeric:tabular-nums; }
  .ref.orphan { cursor:default; } .ref.orphan code { font-size:12px; color:#ef9a9a; word-break:break-all; }
  .empty, .colhint { color:var(--mut); padding:8px; }
  .colhint { padding:24px; }
  details { border-bottom:1px solid var(--line); }
  summary { cursor:pointer; padding:8px 2px; font-weight:600; color:#fff; }
  summary .sub { color:var(--mut); font-weight:400; font-size:12px; }
  .rbody { padding:2px 0 10px; }
  .warn { color:#ef9a9a; } .dyn { color:#ffd54f; } .muted { color:var(--mut); }
  .rbody h4 { margin:8px 0 4px; font-size:13px; color:var(--mut); font-weight:600; }
  table.tt { width:100%; border-collapse:collapse; font-size:13px; }
  table.tt th, table.tt td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); }
  table.tt td:first-child { display:flex; align-items:center; gap:8px; }
  table.tt th:nth-child(2), table.tt td:nth-child(2), table.tt th:last-child, table.tt td:last-child { text-align:right; font-variant-numeric:tabular-nums; }
  table.tt th { color:var(--mut); font-weight:500; }
  table.tt .tot td { font-weight:600; color:#fff; }
  code { font-family:ui-monospace,Menlo,monospace; }
  /* bidirectional dependency tree (拓撲): 5 equal-width columns filling the view */
  #topo { position:absolute; inset:0; display:flex; flex-direction:column; min-height:0; }
  .topohead { flex:0 0 auto; display:grid; grid-template-columns:repeat(5,1fr); border-bottom:1px solid var(--line); background:var(--panel); }
  .th { display:flex; align-items:center; gap:6px; padding:6px 10px; font-size:11px; color:var(--mut); border-right:1px solid var(--line); }
  .th.center { color:var(--acc); justify-content:center; }
  .th .thc { color:var(--fg); background:var(--panel2); border-radius:8px; padding:0 6px; }
  .treebody { flex:1; overflow:auto; min-height:0; }
  .tree { display:grid; grid-template-columns:repeat(5,1fr); grid-auto-rows:30px; align-content:start; padding-block:45vh;
          background-image:linear-gradient(to right, var(--line) 1px, transparent 1px); background-size:20% 100%; }
  .cell { display:flex; align-items:center; gap:5px; padding:0 10px; border-bottom:1px solid #1a2029; cursor:pointer; overflow:hidden; }
  .cell:hover { background:var(--panel2); }
  .cell.sel { background:#243042; box-shadow:inset 2px 0 0 var(--acc); }
  .cell.root { background:#26303d; border:1px solid var(--acc); border-radius:5px; justify-content:center; font-weight:600; }
  .cell.root.sel { box-shadow:0 0 0 2px var(--acc); }
  .cell.left { flex-direction:row-reverse; text-align:right; }
  .cell .tw { width:12px; flex:0 0 auto; color:var(--mut); text-align:center; }
  .cell .cnm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  /* quick-open palette (key "/") */
  #palette { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; justify-content:center; align-items:flex-start; padding-top:90px; z-index:50; }
  #palette[hidden] { display:none; }
  .palette-box { width:620px; max-width:90vw; background:var(--panel); border:1px solid var(--line); border-radius:8px; box-shadow:0 12px 40px rgba(0,0,0,.5); overflow:hidden; }
  #paletteInput { width:100%; padding:12px 14px; background:var(--panel2); border:0; border-bottom:1px solid var(--line); color:var(--fg); font-size:15px; outline:none; }
  #paletteList { max-height:50vh; overflow:auto; }
  .pitem { display:flex; align-items:center; gap:8px; padding:7px 14px; cursor:pointer; }
  .pitem.on, .pitem:hover { background:var(--panel2); }
  .pitem .pnm { color:var(--fg); }
  .pitem .pdir { color:var(--mut); font-size:11px; margin-left:auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:50%; }
  /* usage popup — where the selected item sits inside its tree-parent */
  #usagePopup { position:fixed; z-index:60; width:max-content; min-width:220px; max-width:60vw; max-height:50vh; overflow:auto;
    background:var(--panel2); border:1px solid var(--acc); border-radius:7px; box-shadow:0 8px 28px rgba(0,0,0,.55); font-size:12px; }
  #usagePopup[hidden] { display:none; }
  .up-head { padding:6px 11px; border-bottom:1px solid var(--line); color:var(--mut); position:sticky; top:0; background:var(--panel2); }
  .up-head b { color:#fff; }
  .up-list { padding:3px 0; }
  .up-site { padding:4px 11px; color:var(--fg); white-space:nowrap; font-variant-numeric:tabular-nums; }
  .up-click { display:inline-flex; align-items:center; gap:3px; font-size:12px; color:#04222f; background:var(--acc); padding:1px 7px; border-radius:9px; font-weight:600; }
</style>
</head>
<body>
<div id="banner">
  <button id="pickBtn">選擇 Cocos 專案目錄</button>
  <span id="projectName">未載入</span>
  <span id="stats"></span>
  <nav class="btabs">
    <button data-tab="list" class="active">清單</button>
    <button data-tab="topo">拓撲</button>
    <button data-tab="reports">報告</button>
  </nav>
  <span id="status"></span>
</div>
<div id="filterbar" hidden><span class="flabel">類型篩選</span><div id="typeFilters"></div></div>
<div id="content">
  <section id="tab-list" class="tab">
    <input id="search" placeholder="搜尋資產路徑…（或按 / 快速開啟）">
    <div id="nodeList"><div class="empty">先選擇專案目錄</div></div>
  </section>
  <section id="tab-topo" class="tab" hidden>
    <div id="topo"><div class="colhint">從「清單」選一個資產，或按 / 搜尋，作為中心。</div></div>
  </section>
  <section id="tab-reports" class="tab" hidden>
    <div id="reports"><div class="empty">先選擇專案目錄</div></div>
  </section>
</div>
<div id="palette" hidden>
  <div class="palette-box">
    <input id="paletteInput" placeholder="搜尋檔名… (↑↓ 選擇 · Enter 開啟 · Esc 關閉)" spellcheck="false">
    <div id="paletteList"></div>
  </div>
</div>
<div id="usagePopup" hidden></div>
<script src="dist/app.bundle.js"></script>
</body>
</html>
