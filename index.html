<style>
  :root { --bg:#11151c; --panel:#171c26; --panel2:#1d2430; --line:#2a3340; --fg:#cfd8dc; --mut:#7c8b9a; --acc:#4fc3f7; }
  * { box-sizing: border-box; }
  html, body { overscroll-behavior:none; } /* stop the macOS two-finger swipe-back */
  body { margin:0; font:13px/1.4 -apple-system,"Segoe UI",Roboto,"PingFang TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--fg); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  #topo, .treebody, #tab-list, #tab-reports { overscroll-behavior:none; }
  /* banner */
  #banner { display:flex; align-items:center; gap:12px; padding:6px 12px; background:var(--panel); border-bottom:1px solid var(--line); }
  #pickBtn { background:var(--acc); color:#04222f; border:0; padding:7px 14px; border-radius:6px; font-weight:600; cursor:pointer; }
  #pickBtn:disabled { opacity:.5; cursor:not-allowed; }
  #projectName { font-weight:600; color:#fff; }
  #stats { color:var(--mut); font-size:12px; }
  #status { color:var(--acc); font-variant-numeric:tabular-nums; font-size:12px; }
  .btabs { display:flex; gap:4px; margin-left:8px; }
  .btabs button { background:var(--panel2); border:1px solid var(--line); color:var(--mut); padding:6px 14px; border-radius:6px; cursor:pointer; }
  .btabs button.active { background:var(--acc); color:#04222f; border-color:var(--acc); font-weight:600; }
  #status { margin-left:auto; }
  #langSel { position:relative; z-index:48; background:var(--panel2); color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:4px 6px; font-size:12px; cursor:pointer; }
  #helpBtn { position:relative; z-index:48; width:26px; height:26px; flex:0 0 auto; border-radius:50%; border:1px solid var(--line); background:var(--panel2); color:var(--mut); font-size:14px; line-height:1; cursor:pointer; padding:0; }
  #helpBtn:hover { color:var(--fg); border-color:var(--acc); }
  #ghLink { position:relative; z-index:48; flex:0 0 auto; display:inline-flex; align-items:center; color:var(--mut); }
  #ghLink:hover { color:var(--fg); }
  /* help / about modal */
  #help { position:fixed; inset:0; z-index:55; background:rgba(0,0,0,.5); display:flex; justify-content:center; align-items:flex-start; padding:60px 20px; }
  #help[hidden] { display:none; }
  .help-box { width:680px; max-width:94vw; max-height:80vh; display:flex; flex-direction:column; background:var(--panel); border:1px solid var(--line); border-radius:10px; box-shadow:0 16px 48px rgba(0,0,0,.5); overflow:hidden; }
  .help-head { display:flex; align-items:center; padding:12px 16px; border-bottom:1px solid var(--line); font-weight:600; color:#fff; }
  .help-x { margin-left:auto; background:transparent; border:0; color:var(--mut); font-size:16px; cursor:pointer; line-height:1; padding:2px 4px; }
  .help-x:hover { color:var(--fg); }
  .help-body { flex:1 1 auto; min-height:0; padding:4px 18px 20px; overflow:auto; color:var(--fg); font-size:13px; line-height:1.7; }
  .help-foot { flex:0 0 auto; padding:10px 16px; border-top:1px solid var(--line); }
  .help-foot a { color:var(--acc); text-decoration:none; font-size:12px; }
  .help-foot a:hover { text-decoration:underline; }
  .help-body h3 { font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--acc); margin:18px 0 6px; }
  .help-body p { margin:4px 0; }
  .help-body ul { margin:4px 0; padding-left:20px; }
  .help-body li { margin:4px 0; }
  .help-body code { background:var(--panel2); padding:1px 5px; border-radius:4px; font-size:12px; }
  .help-body kbd { background:var(--panel2); border:1px solid var(--line); border-bottom-width:2px; border-radius:4px; padding:0 5px; font:11px ui-monospace,Menlo,monospace; color:var(--fg); }
  /* global type filter — shared by 清單 / 拓撲 / 報告 */
  #filterbar { flex:0 0 auto; display:flex; align-items:center; gap:8px; padding:6px 12px; background:var(--panel); border-bottom:1px solid var(--line); }
  #filterbar[hidden] { display:none; }
  #filterbar .flabel { color:var(--mut); font-size:11px; flex:0 0 auto; }
  #typeFilters { display:flex; flex-wrap:wrap; gap:4px 6px; flex:1; }
  /* content area */
  #content { flex:1; position:relative; min-height:0; }
  /* first-run welcome card (palette-like) — a full-screen mask over banner+content;
     only the card button and the language selector (raised above) are usable */
  #welcome { position:fixed; inset:0; z-index:45; background:rgba(0,0,0,.55); display:flex; justify-content:center; align-items:center; padding:24px; }
  #welcome[hidden] { display:none; }
  .welcome-box { width:520px; max-width:92vw; background:var(--panel); border:1px solid var(--line); border-radius:10px; box-shadow:0 16px 48px rgba(0,0,0,.45); padding:34px 30px; text-align:center; }
  .welcome-box h1 { margin:0 0 10px; font-size:26px; color:#fff; font-weight:700; }
  .welcome-box .tagline { color:var(--mut); font-size:14px; line-height:1.7; margin:0 0 22px; }
  .welcome-box .tagline b { color:var(--fg); font-weight:600; }
  .welcome-box .wbtn { background:var(--acc); color:#04222f; border:0; padding:12px 22px; border-radius:8px; font-weight:600; font-size:15px; cursor:pointer; }
  .welcome-box .wbtn:hover { filter:brightness(1.08); }
  .welcome-box .wbtn:disabled { opacity:.5; cursor:not-allowed; }
  .welcome-box .note { color:var(--mut); font-size:12px; margin:16px 0 0; }
  .tab { position:absolute; inset:0; display:flex; flex-direction:column; min-height:0; }
  .tab[hidden] { display:none; }
  #tab-list { padding:0 10px 10px; overflow:auto; } /* NO top padding: a sticky thead top:0 inside a padded scroller leaves a band where rows bleed above the header */
  #tab-reports { padding:10px; overflow:auto; }
  /* list tab */
  #search { width:100%; padding:7px 9px; background:var(--panel2); border:1px solid var(--line); border-radius:6px; color:var(--fg); margin:10px 0 8px; }
  .chip { display:inline-flex; align-items:center; gap:4px; font-size:13px; color:var(--mut); cursor:pointer; background:var(--panel2); padding:3px 8px; border-radius:10px; border:1px solid transparent; opacity:.55; }
  .chip b { color:var(--fg); }
  .chip.on { opacity:1; border-color:var(--acc); color:var(--fg); }
  .chip.clr { opacity:1; color:#ef9a9a; border-color:#ef535033; }
  .chip.zero { opacity:.28; } /* 拓撲: 此類型不在層0鄰域內 */
  .chip.zero b { color:var(--mut); }
  label.tog { display:flex; align-items:center; gap:6px; color:var(--mut); margin-bottom:8px; font-size:12px; }
  .dot { width:9px; height:9px; border-radius:50%; display:inline-block; flex:0 0 auto; }
  #nodeCount { color:var(--mut); font-size:11px; margin-bottom:4px; }
  table.ptable { width:100%; border-collapse:collapse; font-size:13px; }
  table.ptable thead th { position:sticky; top:0; z-index:1; background:var(--panel); color:var(--mut); font-weight:500; text-align:left; padding:5px 6px; border-bottom:1px solid var(--line); cursor:pointer; user-select:none; white-space:nowrap; }
  table.ptable thead th:hover { color:var(--fg); }
  table.ptable th .ar { color:var(--acc); }
  table.ptable td { padding:4px 6px; border-bottom:1px solid #20262f; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  table.ptable tbody tr { cursor:pointer; }
  table.ptable tbody tr:hover td { background:var(--panel2); }
  table.ptable tbody tr.rooted td { background:#243042; box-shadow:inset 2px 0 0 var(--acc); }
  @keyframes rowFlash { from { background-color:rgba(79,195,247,.38); } to { background-color:transparent; } }
  table.ptable tbody tr.flash td { animation:rowFlash 1.1s ease-out; }
  table.ptable tbody tr.lsel td { background:#2b4a66; }
  table.ptable .cnm { width:28%; } table.ptable .cdir { width:24%; color:var(--mut); }
  table.ptable .ctype { width:11%; } table.ptable .cnum { width:auto; text-align:right; font-variant-numeric:tabular-nums; }
  table.ptable .cclo { color:var(--mut); } /* transitive-closure counts, dimmer than direct in/out */
  table.ptable .cnm .dot { margin-right:5px; }
  /* reports */
  .ref { display:flex; align-items:center; gap:6px; padding:3px 5px; border-radius:4px; cursor:pointer; }
  .ref:hover { background:var(--panel2); }
  .ref .nm { flex:0 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ref .rdir { flex:0 1 auto; min-width:0; color:var(--mut); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ref .meta { margin-left:auto; flex:0 0 auto; color:var(--mut); font-size:12px; font-variant-numeric:tabular-nums; }
  .ref.orphan { cursor:default; } .ref.orphan code { font-size:12px; color:#ef9a9a; word-break:break-all; }
  .empty, .colhint { color:var(--mut); padding:8px; }
  .colhint { padding:24px; }
  details { border-bottom:1px solid var(--line); }
  summary { cursor:pointer; padding:8px 2px; font-weight:600; color:#fff; }
  summary .sub { color:var(--mut); font-weight:400; font-size:12px; }
  .rbody { padding:2px 0 10px; }
  .warn { color:#ef9a9a; } .dyn { color:#ffd54f; } .muted { color:var(--mut); }
  .rbody h4 { margin:8px 0 4px; font-size:13px; color:var(--mut); font-weight:600; }
  table.tt { width:100%; border-collapse:collapse; font-size:13px; }
  table.tt th, table.tt td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); }
  table.tt td:first-child { display:flex; align-items:center; gap:8px; }
  table.tt th:nth-child(2), table.tt td:nth-child(2), table.tt th:last-child, table.tt td:last-child { text-align:right; font-variant-numeric:tabular-nums; }
  table.tt th { color:var(--mut); font-weight:500; }
  table.tt .tot td { font-weight:600; color:#fff; }
  code { font-family:ui-monospace,Menlo,monospace; }
  /* bidirectional dependency tree (拓撲): 5 equal-width columns filling the view */
  #topo { position:absolute; inset:0; display:flex; flex-direction:column; min-height:0; }
  .topohead { flex:0 0 auto; display:grid; grid-template-columns:repeat(5,1fr); border-bottom:1px solid var(--line); background:var(--panel); }
  .th { display:flex; align-items:center; gap:6px; padding:6px 10px; font-size:11px; color:var(--mut); border-right:1px solid var(--line); }
  .th i { color:var(--acc); font-style:normal; font-weight:700; }
  .th.center { justify-content:center; background:rgba(79,195,247,.12); box-shadow:inset 0 -2px 0 var(--acc); }
  .th .thc { color:var(--fg); background:var(--panel2); border-radius:8px; padding:0 6px; }
  .treebody { flex:1; overflow:auto; min-height:0; }
  .tree { display:grid; grid-template-columns:repeat(5,1fr); grid-auto-rows:30px; align-content:start; padding-block:45vh;
          background-image:linear-gradient(to right, var(--line) 1px, transparent 1px); background-size:20% 100%; }
  .cell { display:flex; align-items:center; gap:5px; padding:0 10px; border-bottom:1px solid #1a2029; cursor:pointer; overflow:hidden; }
  .cell:hover { background:var(--panel2); }
  .cell.sel { background:#243042; box-shadow:inset 2px 0 0 var(--acc); }
  .cell.root { background:#26303d; border:1px solid var(--acc); border-radius:5px; justify-content:center; font-weight:600; }
  .cell.root.sel { box-shadow:0 0 0 2px var(--acc); }
  .cell.left { flex-direction:row-reverse; text-align:right; }
  .cell .tw { width:12px; flex:0 0 auto; color:var(--mut); text-align:center; }
  .cell .cnm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cell-copy { flex:0 0 auto; display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; padding:0; background:transparent; border:0; color:var(--mut); cursor:pointer; opacity:0; pointer-events:none; }
  .cell:hover .cell-copy { opacity:.55; pointer-events:auto; }
  .cell-copy:hover { opacity:1; color:var(--fg); }
  .cell-copy.ok { opacity:1; color:#81c784; }
  /* quick-open palette (key "/") */
  #palette { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; justify-content:center; align-items:flex-start; padding-top:90px; z-index:50; }
  #palette[hidden] { display:none; }
  .palette-box { width:880px; max-width:92vw; background:var(--panel); border:1px solid var(--line); border-radius:8px; box-shadow:0 12px 40px rgba(0,0,0,.5); overflow:hidden; }
  #paletteInput { width:100%; padding:12px 14px; background:var(--panel2); border:0; border-bottom:1px solid var(--line); color:var(--fg); font-size:15px; outline:none; }
  #paletteList { max-height:50vh; overflow:auto; }
  .pitem { display:flex; align-items:center; gap:8px; padding:7px 14px; cursor:pointer; }
  .pitem.on, .pitem:hover { background:var(--panel2); }
  .pitem .pnm { color:var(--fg); flex:0 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pitem .hl { color:var(--acc); font-weight:700; }
  .pitem .ptag { flex:0 0 auto; font-size:10px; color:var(--mut); background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:0 6px; }
  .pitem .pdir { color:var(--mut); font-size:11px; margin-left:auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:50%; flex:0 1 auto; }
  .pitem .pclo { flex:0 0 auto; min-width:56px; text-align:right; font-size:11px; color:var(--mut); font-variant-numeric:tabular-nums; white-space:nowrap; }
  .pitem .pclo i { color:var(--acc); font-style:normal; }
  .palette-hint { padding:6px 14px; border-top:1px solid var(--line); background:var(--panel); color:var(--mut); font-size:11px; }
  .palette-hint b { color:var(--acc); font-family:ui-monospace,Menlo,monospace; }
  /* usage popup — where the selected item sits inside its tree-parent */
  #usagePopup { position:fixed; z-index:60; width:max-content; min-width:220px; max-width:60vw; max-height:50vh; overflow:auto;
    background:var(--panel2); border:1px solid var(--acc); border-radius:7px; box-shadow:0 8px 28px rgba(0,0,0,.55); font-size:12px; }
  #usagePopup[hidden] { display:none; }
  .up-head { display:flex; align-items:center; gap:8px; padding:6px 8px 6px 11px; border-bottom:1px solid var(--line); color:var(--mut); position:sticky; top:0; background:var(--panel2); }
  .up-head b { color:#fff; }
  .up-copy { margin-left:auto; flex:0 0 auto; display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; padding:0; background:transparent; border:1px solid var(--line); border-radius:5px; color:var(--mut); cursor:pointer; }
  .up-copy:hover { color:var(--fg); background:var(--panel); border-color:var(--acc); }
  .up-copy.ok { color:#81c784; border-color:#81c78155; }
  .up-list { padding:3px 0; }
  .up-site { padding:4px 11px; color:var(--fg); white-space:nowrap; font-variant-numeric:tabular-nums; }
  .up-click { display:inline-flex; align-items:center; gap:3px; font-size:12px; color:#04222f; background:var(--acc); padding:1px 7px; border-radius:9px; font-weight:600; }
</style>
</head>
<body>
<div id="banner">
  <button id="pickBtn" data-i18n="btn.pick">選擇 Cocos 專案目錄</button>
  <span id="projectName" data-i18n="proj.none">未載入</span>
  <span id="stats"></span>
  <nav class="btabs">
    <button data-tab="list" class="active" data-i18n="tab.list">清單</button>
    <button data-tab="topo" data-i18n="tab.topo">拓撲</button>
    <button data-tab="reports" data-i18n="tab.reports">報告</button>
  </nav>
  <span id="status"></span>
  <select id="langSel" title="Language / 語言"><option value="zh-Hant">繁中</option><option value="en">English</option></select>
  <button id="helpBtn" data-i18n-title="help.btn" title="說明">?</button>
  <a id="ghLink" href="https://github.com/aaronhg/coir" target="_blank" rel="noopener" title="GitHub" aria-label="GitHub"><svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg></a>
</div>
<div id="filterbar" hidden><span class="flabel" data-i18n="filter.label">類型篩選</span><div id="typeFilters"></div></div>
<div id="content">
  <div id="welcome">
    <div class="welcome-box">
      <h1>🥥 Coir</h1>
      <p class="tagline" data-i18n-html="welcome.tagline"></p>
      <button id="welcomeBtn" class="wbtn" data-i18n="btn.pick">選擇 Cocos 專案目錄</button>
      <p class="note" data-i18n="welcome.note">需 Chrome / Edge（File System Access API）</p>
    </div>
  </div>
  <section id="tab-list" class="tab">
    <input id="search" data-i18n-ph="search.ph" placeholder="搜尋資產路徑…（或按 / 快速開啟）">
    <div id="nodeList"><div class="empty" data-i18n="empty.pickFirst">先選擇專案目錄</div></div>
  </section>
  <section id="tab-topo" class="tab" hidden>
    <div id="topo"><div class="colhint" data-i18n="topo.hint">從「清單」選一個資產，或按 / 搜尋，作為中心。</div></div>
  </section>
  <section id="tab-reports" class="tab" hidden>
    <div id="reports"><div class="empty" data-i18n="empty.pickFirst">先選擇專案目錄</div></div>
  </section>
</div>
<div id="palette" hidden>
  <div class="palette-box">
    <input id="paletteInput" data-i18n-ph="palette.ph" placeholder="搜尋檔名 / uuid…　(↑↓ 選擇 · Enter 開啟 · Esc 關閉)" spellcheck="false">
    <div id="paletteList"></div>
    <div class="palette-hint" data-i18n-html="palette.hint"><b>@</b> sprite-frame　<b>#</b> 型別　<b>&gt;</b> 用途/節點　<b>~</b> 邊種類　·　貼 uuid 直接跳</div>
  </div>
</div>
<div id="usagePopup" hidden></div>
<div id="help" hidden>
  <div class="help-box">
    <div class="help-head"><span data-i18n="help.title">說明</span><button id="helpClose" class="help-x" data-i18n-title="help.close" title="關閉" aria-label="Close">✕</button></div>
    <div class="help-body" data-i18n-html="help.body"></div>
    <div class="help-foot"><a href="https://github.com/aaronhg/coir" target="_blank" rel="noopener" data-i18n="help.github">View on GitHub ↗</a></div>
  </div>
</div>
