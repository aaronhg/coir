name: Deploy site to GitHub Pages

# Build the bundle in CI and publish the static site, so dist/ never needs to be
# committed. Requires repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual re-deploys from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Stage the published site
        run: |
          mkdir -p _site/img
          cp index.html robots.txt sitemap.xml .nojekyll _site/
          cp -r dist _site/
          cp img/coir-topology.png _site/img/   # the og:image only — cocos-project.png is README-only, not part of the site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
